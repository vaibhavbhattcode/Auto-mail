<script>
const { createApp, ref, reactive, onMounted, nextTick } = Vue;

createApp({
    setup() {
        const authState = reactive({ logged_in: false, user: null });
        const isRegisterMode = ref(false);
        const authForm = reactive({ email: '', password: '', full_name: '' });
        
        const currentTab = ref('dashboard');
        const currentTabName = ref('Overview Dashboard');
        const showMobileSidebar = ref(false);
        
        const darkMode = ref(false);
        const toast = reactive({ show: false, message: '', type: 'success' });
        
        // Modal states
        const modals = reactive({
            upload: false,
            smtp: false,
            campaign: false,
            bulkSchedule: false,
            singleSchedule: false,
            previewEmail: false,
            addManualLeads: false
        });

        // Add manual leads form state
        const addManualForm = reactive({
            mode: 'single', // 'single' or 'bulk'
            recipient_email: '',
            emails: '',
            cc: '',
            bcc: '',
            subject: '',
            body: '',
            company_name: '',
            variables: ''
        });

        // Global Platform configuration settings
        const globalSettings = reactive({
            daily_email_limit: 500,
            max_emails_per_hour: 50,
            min_cooldown_seconds: 10,
            max_cooldown_seconds: 30,
            emails_per_batch: 5,
            batch_cooldown_minutes: 5,
            randomize_cooldown: 'true',
            tracking_domain: 'http://localhost:5000',
            email_mode: 'simulated'
        });

        const systemFields = [
            { value: 'recipient_email', label: 'Recipient Email (To)', required: true },
            { value: 'cc', label: 'CC (Carbon Copy)', required: false },
            { value: 'bcc', label: 'BCC (Blind CC)', required: false },
            { value: 'subject', label: 'Email Subject Line', required: true },
            { value: 'body', label: 'Email Body Content', required: true },
            { value: 'attachments', label: 'Attachments File Column', required: false },
            { value: 'company_name', label: 'Company / Lead Name (Variable)', required: false }
        ];

        // Core data lists
        const smtpAccounts = ref([]);
        const campaigns = ref([]);
        const suppressions = ref([]);
        
        const activeCampaign = ref(null);
        const activeCampaignLeads = ref([]);
        const activeCampaignStats = ref({ stats: { success_rate: 0, open_rate: 0, click_rate: 0, bounces: 0 } });
        
        // Search & Filters state
        const campaignFilters = reactive({ search: '', status: 'All' });
        const leadFilters = reactive({ search: '', status: 'All' });
        
        // Active Form models
        const activeSmtp = reactive({ id: null, sender_name: '', email_address: '', smtp_host: '', smtp_port: 587, ssl_tls: 'tls', password: '' });
        const activeCampaignForm = reactive({ id: null, name: '', description: '', smtp_account_id: null });
        const bulkScheduleForm = reactive({ start_time: '', interval: 2 });
        const singleScheduleForm = reactive({ lead_id: null, scheduled_time: '' });
        const activePreviewLead = ref({});

        // Upload CSV/Excel Wizard state
        const wizardStep = ref(1);
        const uploadError = ref('');
        const selectedFile = ref(null);
        const previewData = ref({ headers: [], sample_rows: [], filename: '', filepath: '' });
        const columnMapping = ref({});
        const columnMappingSelector = reactive({});
        const columnMappingCustom = reactive({});
        const isUploading = ref(false);
        const newSuppressionEmail = ref('');

        // Summary metrics
        const summaryStats = reactive({
            campaigns: { total: 0, active: 0, scheduled: 0, completed: 0, failed: 0 },
            leads_metrics: { total: 0, sent: 0, failed: 0, pending: 0, scheduled: 0, opens: 0, clicks: 0, bounces: 0, unsubscribes: 0, success_rate: 0, open_rate: 0, click_rate: 0 }
        });

        // ChartJS instance reference
        let chartInstance = null;

        const showToast = (msg, type = 'success') => {
            toast.message = msg;
            toast.type = type;
            toast.show = true;
            setTimeout(() => { toast.show = false; }, 4000);
        };

        // Tab selection
        const setTab = (tab) => {
            currentTab.value = tab;
            if (tab === 'dashboard') {
                currentTabName.value = 'Overview Dashboard';
                fetchSummaryStats();
            } else if (tab === 'campaigns') {
                currentTabName.value = 'Email Campaigns';
                fetchCampaigns();
            } else if (tab === 'smtp') {
                currentTabName.value = 'SMTP Configurations';
                fetchSmtpAccounts();
            } else if (tab === 'suppression') {
                currentTabName.value = 'Suppression Block List';
                fetchSuppressions();
            } else if (tab === 'settings') {
                currentTabName.value = 'Global Platform Settings';
            }
        };

        // Dark mode
        const toggleDarkMode = () => {
            darkMode.value = !darkMode.value;
            localStorage.setItem('oc_dark_mode', darkMode.value);
            document.documentElement.classList.toggle('dark', darkMode.value);
            nextTick(initOrUpdateChart);
        };

        // Toggle simulation / live email mode
        const toggleSendingMode = async () => {
            globalSettings.email_mode = globalSettings.email_mode === 'live' ? 'simulated' : 'live';
            await saveGlobalSettings();
        };

        // Authentication calls
        const handleAuth = async () => {
            const url = isRegisterMode.value ? '/api/auth/register' : '/api/auth/login';
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(authForm)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchAuthStatus();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Authentication connection failed.', 'error');
            }
        };

        const handleLogout = async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            authState.logged_in = false;
            authState.user = null;
            showToast('Successfully logged out.', 'success');
        };

        const fetchAuthStatus = async () => {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                authState.logged_in = data.logged_in;
                authState.user = data.user;
                if (authState.logged_in) {
                    loadAppData();
                }
            } catch (e) {
                console.error(e);
            }
        };

        const loadAppData = () => {
            fetchGlobalSettings();
            fetchSummaryStats();
            fetchCampaigns();
            fetchSmtpAccounts();
            fetchSuppressions();
            // Start polling analytics
            setInterval(() => {
                if (authState.logged_in) {
                    fetchSummaryStats();
                    if (currentTab.value === 'campaign-details' && activeCampaign.value) {
                        fetchActiveCampaignStats();
                    }
                }
            }, 10000);
        };

        // Settings
        const fetchGlobalSettings = async () => {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const data = await res.json();
                    Object.assign(globalSettings, data);
                }
            } catch (e) {
                console.error('Error fetching settings:', e);
            }
        };

        const saveGlobalSettings = async () => {
            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(globalSettings)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Global settings updated.', 'success');
                    fetchGlobalSettings();
                }
            } catch (e) {
                showToast('Failed to save settings.', 'error');
            }
        };

        // Summary statistics
        const fetchSummaryStats = async () => {
            try {
                const res = await fetch('/api/dashboard/summary');
                const data = await res.json();
                Object.assign(summaryStats, data);
                nextTick(initOrUpdateChart);
            } catch (e) {
                console.error(e);
            }
        };

        // Charts rendering
        const initOrUpdateChart = () => {
            const ctx = document.getElementById('overviewChart');
            if (!ctx) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#475569';
            const gridColor = isDark ? '#334155' : '#e2e8f0';

            const m = summaryStats.leads_metrics;
            const chartData = [m.sent, m.pending, m.failed, m.bounces];

            if (chartInstance) {
                chartInstance.data.datasets[0].data = chartData;
                chartInstance.options.scales.x.grid.color = gridColor;
                chartInstance.options.scales.y.grid.color = gridColor;
                chartInstance.options.scales.x.ticks.color = textColor;
                chartInstance.options.scales.y.ticks.color = textColor;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Sent successfully', 'Pending queue', 'Failed Sends', 'Bounces'],
                        datasets: [{
                            label: 'Recipient count',
                            data: chartData,
                            backgroundColor: [
                                '#10b981', // emerald
                                '#6366f1', // indigo
                                '#f43f5e', // rose
                                '#f59e0b'  // amber
                            ],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { color: gridColor },
                                ticks: { color: textColor }
                            },
                            y: {
                                grid: { color: gridColor },
                                ticks: { color: textColor, precision: 0 }
                            }
                        }
                    }
                });
            }
        };

        // SMTP calls
        const fetchSmtpAccounts = async () => {
            try {
                const res = await fetch('/api/smtp-accounts');
                if (res.ok) {
                    smtpAccounts.value = await res.json();
                }
            } catch (e) {
                console.error('Error fetching SMTP accounts:', e);
            }
        };

        const openAddSmtpModal = () => {
            Object.assign(activeSmtp, { id: null, sender_name: '', email_address: '', smtp_host: '', smtp_port: 587, ssl_tls: 'tls', password: '' });
            modals.smtp = true;
        };

        const openEditSmtpModal = (acc) => {
            Object.assign(activeSmtp, acc, { password: '' });
            modals.smtp = true;
        };

        const saveSmtpAccount = async () => {
            const url = activeSmtp.id ? `/api/smtp-accounts/${activeSmtp.id}` : '/api/smtp-accounts';
            const method = activeSmtp.id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(activeSmtp)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.smtp = false;
                    fetchSmtpAccounts();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Failed to save SMTP configurations.', 'error');
            }
        };

        const deleteSmtpAccount = async (id) => {
            if (!confirm('Are you sure you want to delete this SMTP account? Campaign mapping to this account will be reset.')) return;
            await fetch(`/api/smtp-accounts/${id}`, { method: 'DELETE' });
            showToast('SMTP configuration deleted.', 'success');
            fetchSmtpAccounts();
        };

        const testSmtpConnection = async (id) => {
            showToast('Sending SMTP verification test email...', 'success');
            try {
                const res = await fetch(`/api/smtp-accounts/${id}/test`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('Connection verified! Test email successfully sent.', 'success');
                } else {
                    showToast('SMTP Test Failed: ' + data.message, 'error');
                }
            } catch (e) {
                showToast('SMTP verification test failed.', 'error');
            }
        };

        // Campaign calls
        const fetchCampaigns = async () => {
            try {
                const params = new URLSearchParams({
                    search: campaignFilters.search,
                    status: campaignFilters.status
                });
                const res = await fetch('/api/campaigns?' + params);
                if (res.ok) {
                    campaigns.value = await res.json();
                }
            } catch (e) {
                console.error('Error fetching campaigns:', e);
            }
        };

        const openCreateCampaignModal = () => {
            Object.assign(activeCampaignForm, { id: null, name: '', description: '', smtp_account_id: smtpAccounts.value[0]?.id || null });
            modals.campaign = true;
        };

        const openEditCampaignModal = () => {
            Object.assign(activeCampaignForm, activeCampaign.value);
            modals.campaign = true;
        };

        const saveCampaign = async () => {
            const url = activeCampaignForm.id ? `/api/campaigns/${activeCampaignForm.id}` : '/api/campaigns';
            const method = activeCampaignForm.id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(activeCampaignForm)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.campaign = false;
                    fetchCampaigns();
                    if (activeCampaignForm.id) {
                        // Refresh details
                        viewCampaignDetails({ id: activeCampaignForm.id });
                    }
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Failed to save campaign.', 'error');
            }
        };

        const duplicateCampaign = async (id) => {
            showToast('Duplicating campaign...', 'success');
            try {
                const res = await fetch(`/api/campaigns/${id}/duplicate`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchCampaigns();
                }
            } catch (e) {
                showToast('Error duplicating campaign.', 'error');
            }
        };

        const deleteCampaign = async (id) => {
            if (!confirm('Are you sure you want to permanently delete this campaign and all of its leads? This action cannot be undone.')) return;
            await fetch(`/api/campaigns/${id}`, { method: 'DELETE' });
            showToast('Campaign deleted.', 'success');
            fetchCampaigns();
            if (activeCampaign.value && activeCampaign.value.id === id) {
                setTab('campaigns');
            }
        };

        const toggleCampaignStatus = async (camp, action) => {
            try {
                const res = await fetch(`/api/campaigns/${camp.id}/${action}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchCampaigns();
                    if (activeCampaign.value && activeCampaign.value.id === camp.id) {
                        viewCampaignDetails(camp);
                    }
                }
            } catch (e) {
                showToast('Failed to change campaign status.', 'error');
            }
        };

        // Campaign Details View & Leads list
        const viewCampaignDetails = async (camp) => {
            currentTab.value = 'campaign-details';
            currentTabName.value = 'Campaign Dashboard';
            
            // Fetch campaign full details
            const res = await fetch(`/api/campaigns?search=${encodeURIComponent(camp.name)}`);
            const list = await res.json();
            const found = list.find(item => item.id === camp.id);
            activeCampaign.value = found || camp;
            
            fetchActiveCampaignLeads();
            fetchActiveCampaignStats();
        };

        const fetchActiveCampaignLeads = async () => {
            if (!activeCampaign.value) return;
            const params = new URLSearchParams({
                search: leadFilters.search,
                status: leadFilters.status
            });
            const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/leads?` + params);
            activeCampaignLeads.value = await res.json();
        };

        const fetchActiveCampaignStats = async () => {
            if (!activeCampaign.value) return;
            const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/stats`);
            activeCampaignStats.value = await res.json();
            // Automatically update completion progress on activeCampaign
            activeCampaign.value.status = activeCampaignStats.value.campaign.status;
        };

        // Lead operations
        const deleteLead = async (id) => {
            if (!confirm('Are you sure you want to delete this recipient?')) return;
            await fetch(`/api/campaigns/${activeCampaign.value.id}/leads/${id}`, { method: 'DELETE' });
            showToast('Lead deleted.', 'success');
            fetchActiveCampaignLeads();
            fetchActiveCampaignStats();
        };

        const dispatchLeadInstant = async (leadId) => {
            showToast('Attempting to dispatch email immediately...', 'success');
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/leads/${leadId}/send`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Failed to send email.', 'error');
            }
        };

        const resetLeadStatus = async (lead) => {
            const payload = {
                recipient_email: lead.recipient_email,
                cc: lead.cc || '',
                bcc: lead.bcc || '',
                subject: lead.subject || '',
                body: lead.body || '',
                variables: lead.variables || '{}',
                status: 'Pending',
                scheduled_time: null
            };
            
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/leads/${lead.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Recipient status reset to Pending.', 'success');
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                } else {
                    showToast(data.message || 'Failed to reset recipient status.', 'error');
                }
            } catch (e) {
                showToast('Network error while resetting recipient status.', 'error');
            }
        };

        // Scheduling Individual Lead Modal
        const openSingleScheduleModal = (lead) => {
            singleScheduleForm.lead_id = lead.id;
            const nextHour = new Date();
            nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
            // format: YYYY-MM-DDTHH:MM
            singleScheduleForm.scheduled_time = nextHour.toISOString().slice(0, 16);
            modals.singleSchedule = true;
        };

        const saveSingleSchedule = async () => {
            const formatted = singleScheduleForm.scheduled_time.replace('T', ' ');
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/leads/${singleScheduleForm.lead_id}/schedule`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scheduled_time: formatted })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.singleSchedule = false;
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                }
            } catch (e) {
                showToast('Scheduling failed.', 'error');
            }
        };

        // Bulk Interval Scheduling
        const saveBulkSchedule = async () => {
            const formatted = bulkScheduleForm.start_time.replace('T', ' ');
            showToast('Scheduling campaign queue based on interval...', 'success');
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/bulk-schedule`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start_time: formatted, interval: bulkScheduleForm.interval })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.bulkSchedule = false;
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                }
            } catch (e) {
                showToast('Bulk scheduling request failed.', 'error');
            }
        };

        // Email Preview Modal
        const previewRenderedEmail = (lead) => {
            activePreviewLead.value = lead;
            modals.previewEmail = true;
        };

        const getRenderedEmailHtml = (lead) => {
            if (!lead.body) return '';
            // Simple dynamic replacement
            let variables = {};
            try {
                variables = JSON.parse(lead.variables);
            } catch (e) {}

            let body = lead.body;
            // Merge actual parameters
            variables['recipient_email'] = lead.recipient_email;
            variables['cc'] = lead.cc || '';
            variables['bcc'] = lead.bcc || '';
            variables['subject'] = lead.subject || '';

            // Dynamic replacement
            for (const [k, v] of Object.entries(variables)) {
                body = body.replace(new RegExp(`\\{\\{\\s*${k}\\s*\\}\\}`, 'gi'), v);
                body = body.replace(new RegExp(`\\[\\[\\s*${k}\\s*\\]\\]`, 'gi'), v);
            }

            // Convert newlines to breaks
            return body.replace(/\n/g, '<br>');
        };

        // Export Report
        const handleExportReport = (e) => {
            const format = e.target.value;
            if (!format) return;
            window.open(`/api/campaigns/${activeCampaign.value.id}/export?format=${format}`);
            // Reset
            e.target.value = '';
        };

        // Suppression Block lists
        const fetchSuppressions = async () => {
            try {
                const res = await fetch('/api/suppression-list');
                if (res.ok) {
                    suppressions.value = await res.json();
                }
            } catch (e) {
                console.error('Error fetching suppressions:', e);
            }
        };

        const addSuppression = async () => {
            try {
                const res = await fetch('/api/suppression-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: newSuppressionEmail.value, reason: 'Manual Opt-Out Block' })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    newSuppressionEmail.value = '';
                    fetchSuppressions();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Opt-out block request failed.', 'error');
            }
        };

        const deleteSuppression = async (id) => {
            await fetch(`/api/suppression-list/${id}`, { method: 'DELETE' });
            showToast('Opt-out address unblocked.', 'success');
            fetchSuppressions();
        };

        // Manual Leads Addition
        const openAddManualLeadsModal = () => {
            addManualForm.mode = 'single';
            addManualForm.recipient_email = '';
            addManualForm.emails = '';
            addManualForm.cc = '';
            addManualForm.bcc = '';
            addManualForm.subject = '';
            addManualForm.body = '';
            addManualForm.company_name = '';
            addManualForm.variables = '';
            modals.addManualLeads = true;
        };

        const saveManualLeads = async () => {
            if (!activeCampaign.value) return;
            
            // Build variables payload
            let vars = {};
            if (addManualForm.company_name) {
                vars['company_name'] = addManualForm.company_name;
            }
            if (addManualForm.variables) {
                try {
                    vars = { ...vars, ...JSON.parse(addManualForm.variables) };
                } catch (e) {
                    showToast('Invalid JSON in Custom Variables field.', 'error');
                    return;
                }
            }
            
            const payload = {
                recipient_email: addManualForm.recipient_email,
                emails: addManualForm.emails,
                cc: addManualForm.cc,
                bcc: addManualForm.bcc,
                subject: addManualForm.subject,
                body: addManualForm.body,
                variables: JSON.stringify(vars)
            };
            
            showToast('Adding leads manually...', 'success');
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/leads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.addManualLeads = false;
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                } else {
                    showToast(data.message || 'Failed to add leads.', 'error');
                }
            } catch (e) {
                showToast('Network error while adding leads.', 'error');
            }
        };

        // Excel Column Mapping Import Wizard
        const triggerUploadModal = () => {
            selectedFile.value = null;
            wizardStep.value = 1;
            uploadError.value = '';
            columnMapping.value = {};
            modals.upload = true;
        };

        const handleFileChange = (e) => {
            selectedFile.value = e.target.files[0];
            uploadError.value = '';
        };

        const handleFileDrop = (e) => {
            selectedFile.value = e.dataTransfer.files[0];
            uploadError.value = '';
        };

        const uploadAndPreview = async () => {
            if (!selectedFile.value) return;
            const formData = new FormData();
            formData.append('file', selectedFile.value);
            formData.append('preview', 'true');
            
            uploadError.value = '';
            showToast('Uploading sheet to analyze columns...', 'success');
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success && data.preview) {
                    previewData.value = data;
                    // Auto-mapping heuristics
                    autoDetectColumns(data.headers);
                    wizardStep.value = 2;
                } else {
                    uploadError.value = data.message || 'Failed to process file.';
                    showToast(uploadError.value, 'error');
                }
            } catch (e) {
                uploadError.value = 'Failed to upload sheet file.';
                showToast(uploadError.value, 'error');
            }
        };

        const handleMappingSelectorChange = (fieldValue) => {
            if (columnMappingSelector[fieldValue] !== 'custom') {
                columnMappingCustom[fieldValue] = '';
            }
        };

        const syncSelectorsFromMapping = () => {
            systemFields.forEach(f => {
                const val = columnMapping.value[f.value];
                if (val === undefined || val === null) {
                    columnMappingSelector[f.value] = null;
                    columnMappingCustom[f.value] = '';
                } else if (typeof val === 'string' && !/^\d+$/.test(val)) {
                    columnMappingSelector[f.value] = 'custom';
                    columnMappingCustom[f.value] = val;
                } else {
                    columnMappingSelector[f.value] = parseInt(val);
                    columnMappingCustom[f.value] = '';
                }
            });
        };

        const compileMappingFromSelectors = () => {
            const finalMapping = {};
            systemFields.forEach(f => {
                const sel = columnMappingSelector[f.value];
                if (sel === 'custom') {
                    finalMapping[f.value] = columnMappingCustom[f.value] || '';
                } else {
                    finalMapping[f.value] = sel;
                }
            });
            columnMapping.value = finalMapping;
        };

        const autoDetectColumns = (headers) => {
            // Clear
            columnMapping.value = {};
            
            headers.forEach((h, idx) => {
                const lower = h.toLowerCase().trim();
                
                if (lower.includes('email') || lower.includes('mail') || lower.includes('to')) {
                    columnMapping.value['recipient_email'] = idx;
                } else if (lower.includes('cc')) {
                    columnMapping.value['cc'] = idx;
                } else if (lower.includes('bcc')) {
                    columnMapping.value['bcc'] = idx;
                } else if (lower.includes('subject') || lower.includes('title')) {
                    columnMapping.value['subject'] = idx;
                } else if (lower.includes('body') || lower.includes('pitch') || lower.includes('message') || lower.includes('content')) {
                    columnMapping.value['body'] = idx;
                } else if (lower.includes('attachment') || lower.includes('file')) {
                    columnMapping.value['attachments'] = idx;
                } else if (lower.includes('company') || lower.includes('business') || lower.includes('name') || lower.includes('lead')) {
                    columnMapping.value['company_name'] = idx;
                }
            });
            
            // Sync selectors after auto detection
            syncSelectorsFromMapping();
        };

        const validateMapping = () => {
            uploadError.value = '';
            compileMappingFromSelectors();
            
            // Check required fields
            const hasEmail = columnMapping.value['recipient_email'] !== undefined && columnMapping.value['recipient_email'] !== null && columnMapping.value['recipient_email'] !== '';
            const hasSubject = columnMapping.value['subject'] !== undefined && columnMapping.value['subject'] !== null && columnMapping.value['subject'] !== '';
            const hasBody = columnMapping.value['body'] !== undefined && columnMapping.value['body'] !== null && columnMapping.value['body'] !== '';
            
            if (!hasEmail) {
                uploadError.value = 'Mapping Alert: Recipient Email (To) is required.';
                showToast(uploadError.value, 'error');
                return;
            }
            if (!hasSubject) {
                uploadError.value = 'Mapping Alert: Email Subject Line is required.';
                showToast(uploadError.value, 'error');
                return;
            }
            if (!hasBody) {
                uploadError.value = 'Mapping Alert: Email Body Content is required.';
                showToast(uploadError.value, 'error');
                return;
            }
            
            wizardStep.value = 3;
        };

        const getPreviewMappedValue = (field) => {
            const val = columnMapping.value[field];
            if (val === undefined || val === null) return '';
            
            if (typeof val === 'string' && !/^\d+$/.test(val)) {
                // Render custom template value using row variables
                if (!previewData.value || !previewData.value.sample_rows || !previewData.value.sample_rows[0]) {
                    return val;
                }
                const vars = {};
                previewData.value.headers.forEach((h, idx) => {
                    const rowVal = previewData.value.sample_rows[0][idx] || '';
                    vars[h] = rowVal;
                    vars[h.toLowerCase().trim()] = rowVal;
                });
                let rendered = val;
                Object.keys(vars).forEach(k => {
                    rendered = rendered.replace(new RegExp(`\\{\\{\\s*${k}\\s*\\}\\}`, 'gi'), vars[k]);
                    rendered = rendered.replace(new RegExp(`\\[\\[\\s*${k}\\s*\\]\\]`, 'gi'), vars[k]);
                });
                return rendered;
            }
            
            const idx = parseInt(val);
            if (isNaN(idx)) return '';
            // Show first sample row value
            const firstRow = previewData.value.sample_rows[0];
            return firstRow ? firstRow[idx] : '';
        };

        const importLeads = async () => {
            isUploading.value = true;
            uploadError.value = '';
            const formData = new FormData();
            formData.append('file', selectedFile.value);
            formData.append('preview', 'false');
            formData.append('column_mapping', JSON.stringify(columnMapping.value));
            
            try {
                const res = await fetch(`/api/campaigns/${activeCampaign.value.id}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                isUploading.value = false;
                
                if (data.success) {
                    showToast(data.message, 'success');
                    modals.upload = false;
                    fetchActiveCampaignLeads();
                    fetchActiveCampaignStats();
                } else {
                    uploadError.value = data.message || 'Import execution failed.';
                    showToast(uploadError.value, 'error');
                }
            } catch (e) {
                isUploading.value = false;
                uploadError.value = 'Import execution failed.';
                showToast(uploadError.value, 'error');
            }
        };

        // Utility color helpers
        const getCampaignStatusColorClass = (status) => {
            switch (status) {
                case 'draft': return 'bg-slate-300 dark:bg-slate-700';
                case 'scheduled': return 'bg-indigo-500';
                case 'running': return 'bg-emerald-500';
                case 'paused': return 'bg-amber-500';
                case 'completed': return 'bg-blue-500';
                case 'cancelled': return 'bg-slate-400';
                case 'failed': return 'bg-rose-500';
                default: return 'bg-slate-200';
            }
        };

        const getCampaignStatusBadgeClass = (status) => {
            switch (status) {
                case 'draft': return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
                case 'scheduled': return 'bg-indigo-50 text-indigo-700 dark:bg-indigo-950/20 dark:text-indigo-400';
                case 'running': return 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/20 dark:text-emerald-400';
                case 'paused': return 'bg-amber-50 text-amber-700 dark:bg-amber-950/20 dark:text-amber-400';
                case 'completed': return 'bg-blue-50 text-blue-700 dark:bg-blue-950/20 dark:text-blue-400';
                case 'cancelled': return 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400';
                case 'failed': return 'bg-rose-50 text-rose-700 dark:bg-rose-950/20 dark:text-rose-400';
                default: return 'bg-slate-100 text-slate-600';
            }
        };

        const getCampaignProgress = (c) => {
            if (!c.total_leads) return 0;
            const completed = c.sent_count + c.failed_count;
            return Math.round((completed / c.total_leads) * 100);
        };

        onMounted(() => {
            fetchAuthStatus();
            
            // Load theme choice
            const darkSaved = localStorage.getItem('oc_dark_mode') === 'true';
            darkMode.value = darkSaved;
            if (darkSaved) document.documentElement.classList.add('dark');
        });

        return {
            authState, isRegisterMode, authForm, currentTab, currentTabName, darkMode, toast, modals, showMobileSidebar,
            globalSettings, systemFields, smtpAccounts, campaigns, suppressions,
            activeCampaign, activeCampaignLeads, activeCampaignStats, campaignFilters, leadFilters,
            activeSmtp, activeCampaignForm, bulkScheduleForm, singleScheduleForm, activePreviewLead,
            wizardStep, uploadError, selectedFile, previewData, columnMapping, columnMappingSelector, columnMappingCustom, isUploading, newSuppressionEmail, summaryStats,
            addManualForm, openAddManualLeadsModal, saveManualLeads,
            setTab, toggleDarkMode, toggleSendingMode, handleAuth, handleLogout,
            openAddSmtpModal, openEditSmtpModal, saveSmtpAccount, deleteSmtpAccount, testSmtpConnection,
            openCreateCampaignModal, openEditCampaignModal, saveCampaign, duplicateCampaign, deleteCampaign, toggleCampaignStatus,
            viewCampaignDetails, fetchCampaigns, fetchActiveCampaignLeads, deleteLead, dispatchLeadInstant, resetLeadStatus,
            openSingleScheduleModal, saveSingleSchedule, saveBulkSchedule, previewRenderedEmail, getRenderedEmailHtml,
            handleExportReport, addSuppression, deleteSuppression, triggerUploadModal, handleFileChange, handleFileDrop,
            uploadAndPreview, validateMapping, getPreviewMappedValue, importLeads, handleMappingSelectorChange,
            getCampaignStatusColorClass, getCampaignStatusBadgeClass, getCampaignProgress
        };
    }
}).mount('#app');
</script>
